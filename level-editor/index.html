<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slime Flow Level Editor</title>

    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- SortableJS for easy drag-and-drop lists -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body class="dark-theme">
    <div id="app">
        <!-- TOP NAVBAR -->
        <header class="navbar glass-panel">
            <div class="logo">
                <img src="icon.png" class="app-icon" alt="Icon">
                <h1>Slime Flow Level Editor</h1>
            </div>

            <div class="auth-section">
                <div id="user-info" class="hidden">
                    <img id="user-avatar" src="" alt="Avatar">
                    <span id="user-name">User</span>
                    <button id="btn-logout" class="btn outline">Logout</button>
                </div>
                <button id="btn-login" class="btn primary">Login with Google</button>
            </div>
        </header>

        <!-- MAIN WORKSPACE -->
        <main class="workspace">
            <!-- Left & Center columns pooled together -->
            <div class="main-content-area">
                <div class="editor-row">
                    <!-- LEFT PANEL: Board Settings & Tools -->
                    <aside class="panel left-panel glass-panel">
                        <section class="panel-section">
                            <h2>Board Settings</h2>
                            <div class="control-group" id="grid-size-container">
                                <button id="btn-toggle-grid-slider" class="btn outline full-width">
                                    <i class="material-icons">grid_on</i>
                                    <span>Grid: <span id="grid-size-val-btn">16</span></span>
                                </button>
                                <div id="grid-slider-popup" class="hidden-slider">
                                    <label>Size: <span id="grid-size-val">16</span></label>
                                    <input type="range" id="grid-size" min="2" max="60" value="16">
                                </div>
                            </div>
                        </section>

                        <section class="panel-section">
                            <h2>Tools</h2>
                            <div class="hint">Hold <b>ALT</b> while using Brush to delete blocks.</div>
                            <div class="tool-group">
                                <button id="tool-brush" class="tool-btn active"
                                    title="Brush (Left Click to draw, Alt+Click to erase)">
                                    <i class="material-icons">brush</i>
                                    <span>Brush</span>
                                </button>
                                <button id="tool-select" class="tool-btn" title="Select (Drag to select, then drag to move)">
                                    <i class="material-icons">select_all</i>
                                    <span>Select</span>
                                </button>
                                <button id="tool-picker" class="tool-btn"
                                    title="Color Picker (Click on any pixel to copy its color)">
                                    <i class="material-icons">colorize</i>
                                    <span>Picker (I)</span>
                                </button>
                            </div>
                        </section>
                    </aside>

                    <!-- CENTER: Canvas & Palette -->
                    <section class="center-stage">
                        <div class="workspace-layout">
                            <!-- New Compact Color Palette -->
                            <aside class="compact-palette-panel glass-panel">
                                <button class="btn-palette-expand icon-only" title="Toggle Detail View">
                                    <i class="material-icons">chevron_right</i>
                                </button>
                                
                                <div class="palette-list">
                                    <!-- Colors will be injected here -->
                                </div>

                                <div class="palette-footer">
                                    <button class="btn-add-color-trigger icon-only" title="Add New Color">
                                        <i class="material-icons">add</i>
                                    </button>
                                    <!-- Hidden input for the color picker -->
                                    <input type="color" class="hidden-color-input" value="#ff3366" style="display: none;">
                                </div>
                            </aside>

                            <div class="canvas-container glass-panel" id="canvas-wrapper">
                                <div class="zoom-controls">
                                    <button id="btn-zoom-in" class="btn secondary icon-only" title="Zoom In"><i
                                            class="material-icons">add</i></button>
                                    <button id="btn-zoom-out" class="btn secondary icon-only" title="Zoom Out"><i
                                            class="material-icons">remove</i></button>
                                    <button id="btn-fit" class="btn secondary" title="Fit to View">Fit</button>
                                </div>

                                <canvas id="editor-canvas"></canvas>
                            </div>
                        </div>

                        <div id="hp-control-panel" class="hidden glass-panel hp-bottom-bar">
                            <div id="block-hp-container">
                                <label>Selected Item HP: <span id="block-hp-val">1</span></label>
                                <input type="range" id="block-hp-slider" min="1" max="100" value="1">
                            </div>
                            <div id="key-size-container" class="hidden">
                                <div class="key-control-row">
                                    <label>Key Width: <span id="key-w-val">1</span></label>
                                    <input type="range" id="key-w-slider" min="1" max="10" value="1">
                                </div>
                                <div class="key-control-row">
                                    <label>Key Height: <span id="key-h-val">1</span></label>
                                    <input type="range" id="key-h-slider" min="1" max="10" value="1">
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

                <!-- BOTTOM AREA: JSON & Saves (spans Left + Center width) -->
                <div class="bottom-info-area">
                    <!-- JSON Section -->
                    <div class="json-section glass-panel">
                        <div class="section-header">
                            <h2>JSON Output</h2>
                            <div class="button-row">
                                <button id="btn-generate-json" class="btn primary">Generate JSON</button>
                                <button id="btn-copy-json" class="btn secondary">Copy</button>
                                <button id="btn-load-json" class="btn secondary" style="background:#3b82f6; border-color:#3b82f6; color:#fff;">Load JSON</button>
                            </div>
                        </div>
                        <textarea id="json-output" placeholder="Paste JSON here to load, or click Generate JSON to see output here..."></textarea>
                    </div>

                    <!-- Saves Section -->
                    <div class="saves-section glass-panel">
                        <div class="section-header">
                            <h2>Projects</h2>
                            <div class="hint" id="login-hint">Log in to view cloud saves.</div>
                        </div>
                        <div class="saves-carousel" id="saves-carousel">
                            <!-- Create New Card luôn luôn có -->
                            <div class="save-card create-new" id="btn-save-project">
                                <span class="material-icons-rounded">add_circle</span>
                                <h3>Save Project</h3>
                            </div>
                            <!-- Existing saves injected here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT PANEL: Warehouse Units -->
            <aside class="panel right-panel glass-panel">
                <section class="panel-section">
                    <h2>Warehouse Units</h2>

                    <div class="control-group">
                        <label>Columns: <span id="unit-cols-val">3</span></label>
                        <input type="range" id="unit-cols" min="1" max="10" value="3">
                    </div>
                    <div class="control-group">
                        <label>Max Ammo per Unit: <span id="unit-max-ammo-val">20</span></label>
                        <input type="range" id="unit-max-ammo" min="1" max="50" value="20">
                    </div>

                    <div class="button-row">
                        <button id="btn-create-units" class="btn primary flex-grow">Create Units</button>
                        <button id="btn-shuffle-units" class="btn secondary icon-only" title="Shuffle Units">
                            <span class="material-icons-rounded">shuffle</span>
                        </button>
                        <button id="btn-link-mode" class="btn outline icon-only" title="Link Mode (Drag from one unit to another)">
                            <span class="material-icons-rounded">link</span>
                        </button>
                    </div>

                </section>

                <section class="panel-section flex-grow" style="position: relative;">
                    <div class="warehouse-grid-container" style="position: relative; height: 100%;">
                        <svg id="links-svg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: visible;"></svg>
                        <div id="warehouse-columns" class="warehouse-columns" style="position: relative; z-index: 1;">
                            <!-- Columns will go here -->
                        </div>
                    </div>
                </section>

                <section class="panel-section" style="padding-top: 0; border-top: 1px solid rgba(255, 255, 255, 0.1);">
                    <div id="unit-ammo-control" class="control-group hidden" style="margin-top: 15px;">
                        <label>Selected Unit Ammo: <span id="unit-ammo-val">1</span></label>
                        <input type="range" id="unit-ammo-slider" min="1" max="100" value="1">

                        <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 12px; margin-bottom: 4px;">
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-color);">
                                <input type="checkbox" id="unit-is-hidden" style="width: 16px; height: 16px; accent-color: var(--primary-color);">
                                <span style="font-size: 0.9rem;">Is Hidden</span>
                            </label>
                            
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-color);">
                                <input type="checkbox" id="unit-is-barn-lock" style="width: 16px; height: 16px; accent-color: var(--primary-color);">
                                <span style="font-size: 0.9rem;">Is Barn Lock</span>
                            </label>
                        </div>
                        
                        <div id="unit-links-control" class="control-group" style="margin-top: 8px;">
                            <label>Links:</label>
                            <div id="unit-links-list" class="links-list" style="display: flex; gap: 4px; flex-wrap: wrap;"></div>
                        </div>
                    </div>
                </section>
            </aside>
        </main>


    </div>

    <!-- Script loading -->
    <script type="module" src="firebase.js"></script>
    <script type="module" src="script.js"></script>
</body>

</html>
