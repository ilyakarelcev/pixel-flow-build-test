<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity Web Player | Slime Flow</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">

  <style>
    :root {
      --bg-color: #0f0f12;
      --panel-bg: rgba(255, 255, 255, 0.05);
      --accent-color: #4CAF50;
      --accent-hover: #45a049;
      --text-main: #e0e0e0;
      --text-dim: #a0a0a0;
      --border-color: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(0, 0, 0, 0.3);
    }

    body {
      padding: 0;
      margin: 0;
      overflow: hidden;
      background-color: var(--bg-color);
      display: flex;
      flex-direction: row;
      height: 100vh;
      width: 100vw;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-main);
    }

    /* ЛЕВАЯ КОЛОНКА С JSON (30%) */
    #dev-tools {
      width: 30%;
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      padding: 24px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 20px;
      border-right: 1px solid var(--border-color);
      box-shadow: 10px 0 30px rgba(0,0,0,0.5);
      z-index: 10;
    }

    #dev-tools .header {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #dev-tools .header svg {
      width: 24px;
      height: 24px;
      fill: var(--accent-color);
    }

    #dev-tools span {
      font-weight: 600;
      font-size: 18px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--accent-color);
    }

    /* ПОЛЕ ДЛЯ ВВОДА */
    #json-input {
      flex-grow: 1;
      padding: 15px;
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.5;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      resize: none;
      background: var(--input-bg);
      color: #d4d4d4;
      white-space: pre;
      overflow-y: auto;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    #json-input:focus {
      border-color: var(--accent-color);
      box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
    }

    #load-btn {
      padding: 14px 20px;
      background: linear-gradient(135deg, #4CAF50 0%, #2E7D32 100%);
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    #load-btn:hover {
      filter: brightness(1.1);
      box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
      transform: translateY(-1px);
    }

    #load-btn:active {
      transform: translateY(0);
    }

    /* КОНТЕЙНЕР ДЛЯ ИГРЫ (70%) */
    #unity-container {
      width: 70%;
      height: 100%;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #unity-canvas {
      width: 100% !important;
      height: 100% !important;
      box-shadow: 0 0 50px rgba(0,0,0,0.8);
      background: #231f20;
    }

    /* LOADING BAR STYLES */
    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      z-index: 20;
    }

    #unity-logo {
      width: 154px;
      height: 54px;
      background: url('TemplateData/unity-logo-dark.png') no-repeat center;
      background-size: contain;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
    }

    #unity-progress-bar-empty {
      width: 141px;
      height: 18px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 9px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #8BC34A);
      transition: width 0.2s;
    }

    #unity-footer {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      align-items: center;
      background: rgba(0,0,0,0.5);
      padding: 5px 15px;
      border-radius: 20px;
      backdrop-filter: blur(5px);
      font-size: 12px;
      color: var(--text-dim);
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    #unity-footer:hover {
      opacity: 1;
    }

    #unity-fullscreen-button {
      width: 25px;
      height: 25px;
      background: url('TemplateData/fullscreen-button.png') no-repeat center;
      background-size: contain;
      cursor: pointer;
      filter: invert(1);
    }

    /* Scrollbar styling */
    #json-input::-webkit-scrollbar {
      width: 8px;
    }
    #json-input::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.1);
    }
    #json-input::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
    }
    #json-input::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.2);
    }

    .status-hint {
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
    }
  </style>
</head>

<body>
  <!-- НАШ ВНЕШНИЙ ИНТЕРФЕЙС (СЛЕВА) -->
  <div id="dev-tools">
    <div class="header">
      <svg viewBox="0 0 24 24"><path d="M12.89,3L14.85,3.4L11.11,21L9.15,20.6L12.89,3M19.59,12L16,8.41V5.58L22.42,12L16,18.41V15.58L19.59,12M1.58,12L8,5.58V8.41L4.41,12L8,15.58V18.41L1.58,12Z" /></svg>
      <span>Level Editor</span>
    </div>
    <textarea id="json-input" placeholder="Paste your level JSON here... (Ctrl+V)"></textarea>
    <button id="load-btn" onclick="sendJsonToUnity()">
      <span>Load & Restart</span>
    </button>
    <div class="status-hint">Press Load to apply changes to the level</div>
  </div>

  <!-- ДЕФОЛТНЫЙ CANVAS ЮНИТИ (СПРАВА) -->
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"> </div>
    <div id="unity-footer">
      <div id="unity-fullscreen-button" title="Fullscreen"></div>
      <div id="unity-build-title">Slime Flow</div>
    </div>
  </div>

  <script>
    var canvas = document.querySelector("#unity-canvas");

    function unityShowBanner(msg, type) {
      var warningBanner = document.querySelector("#unity-warning");
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type == 'error') div.style = 'background: rgba(255,0,0,0.5); padding: 10px; border-radius: 4px; margin-bottom: 5px;';
      else {
        if (type == 'warning') div.style = 'background: rgba(255,255,0,0.5); padding: 10px; border-radius: 4px; margin-bottom: 5px; color: black;';
        setTimeout(function () {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/WebBuild.loader.js";
    var config = {
      dataUrl: buildUrl + "/WebBuild.data.unityweb",
      frameworkUrl: buildUrl + "/WebBuild.framework.js.unityweb",
        codeUrl: buildUrl + "/WebBuild.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
      companyName: "Eccentric Games",
      productName: "Slime Flow",
      productVersion: "0.1.0",
      showBanner: unityShowBanner,
    };

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);
      document.querySelector("#unity-container").className = "unity-mobile";
      canvas.className = "unity-mobile";
    } else {
      canvas.style.width = "960px";
      canvas.style.height = "600px";
    }

    document.querySelector("#unity-loading-bar").style.display = "flex";

    // Глобальная переменная для доступа к Unity из нашего интерфейса
    var myUnityInstance = null;

    var script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
      }).then((unityInstance) => {
        myUnityInstance = unityInstance; // Сохраняем ссылку!

        document.querySelector("#unity-loading-bar").style.display = "none";
        document.querySelector("#unity-fullscreen-button").onclick = () => {
          unityInstance.SetFullscreen(1);
        };

        // Загружаем дефолтный уровень из файла level.json
        fetch("level.json")
          .then(response => {
            if (response.ok) return response.text();
            throw new Error("level.json not found");
          })
          .then(text => {
            if (text && text.trim() !== "") {
              document.getElementById("json-input").value = text;
              // Сразу отправляем в Unity при старте
              unityInstance.SendMessage("Loader", "ReceiveJSONFromBrowser", text);
            }
          })
          .catch(err => console.log("Default level not loaded:", err));

      }).catch((message) => {
        alert(message);
      });
    };

    document.body.appendChild(script);

    // НАША ФУНКЦИЯ ДЛЯ ВЫЗОВА Unity
    function sendJsonToUnity() {
      if (myUnityInstance !== null) {
        var inputElement = document.getElementById("json-input");
        var jsonString = inputElement.value;

        if (!jsonString) {
          alert("Please paste some JSON first!");
          return;
        }

        myUnityInstance.SendMessage("Loader", "ReceiveJSONFromBrowser", jsonString);
      } else {
        alert("Wait! Unity is still loading...");
      }
    }

    // Отключаем перехват нажатий клавиш Unity, когда мы печатаем в наше текстовое поле
    var jsonInput = document.getElementById("json-input");
    jsonInput.addEventListener("keydown", function (e) { e.stopPropagation(); });
    jsonInput.addEventListener("keyup", function (e) { e.stopPropagation(); });
    jsonInput.addEventListener("keypress", function (e) { e.stopPropagation(); });
  </script>
</body>

</html>
